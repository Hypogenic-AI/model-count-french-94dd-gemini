idea:
  title: How does the model count in French?
  domain: nlp
  hypothesis: 'Large language models internally represent and process the French counting
    system, which is counterintuitive but systematic, in a way that can be mapped
    and analyzed.

    '
  background:
    description: 'French has an infamously counterintuitive counting system:

      https://en.wikipedia.org/wiki/French_language#Numerals

      Given that it''s a bit strange, but very clear, can we map out exactly how an
      LLM represents it?

      '
